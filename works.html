<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem | My Works</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, a, button, .card { cursor: none !important; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* الماوس المخصص المربوط باللون */
        #custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 28px; height: 28px;
            pointer-events: none;
            z-index: 100000;
            filter: drop-shadow(0 0 5px var(--primary-glow));
            transition: transform 0.1s ease-out;
        }

        #cursor-path {
            fill: var(--primary);
            stroke: #ffffff;
            stroke-width: 1.5px;
            transition: fill 0.3s ease;
        }

        nav {
            padding: 25px 8%; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%; z-index: 1000;
            background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary); /* مربوط باللون */
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; opacity: 0.7; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); opacity: 1; }

        .works-header { padding: 150px 8% 50px; text-align: right; }
        .works-header h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; margin-bottom: 10px; }

        .work-section { padding: 50px 8% 100px; }
        
        /* شبكة الصور الموحدة */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #151515; 
            transition: 0.5s;
            position: relative;
        }
        
        .card:hover { 
            border-color: var(--primary); 
            transform: translateY(-10px);
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        /* حل مشكلة المقاسات المختلفة */
        .image-box { 
            height: 400px; /* ارتفاع ثابت لكل الكروت */
            background: #111; 
            overflow: hidden; 
        }
        
        .image-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* يقص الزيادات ويحافظ على النسبة */
            object-position: center;
            transition: 0.8s ease;
            opacity: 0.9;
        }
        
        .card:hover img { 
            transform: scale(1.1); 
            opacity: 1;
        }

        .card-info { padding: 20px; text-align: center; border-top: 1px solid #151515; }
        .card-info h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--text-main); }
        .card-info p { font-size: 0.85rem; color: var(--primary); font-weight: bold; }

        .settings-panel {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 260px; background: #0a0a0a; border: 1px solid var(--primary);
            padding: 25px; z-index: 10001; transition: 0.4s; border-radius: 0 15px 15px 0;
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -45px; top: 0; width: 45px; height: 45px;
            background: var(--primary); border: none; color: white; border-radius: 0 10px 10px 0;
        }

        footer { padding: 40px; text-align: center; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" />
        </svg>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h3 style="color: var(--primary); margin-bottom: 20px;">تخصيص الموقع</h3>
        <input type="color" id="fullColorPicker" class="custom-color-input" style="width:100%; height:40px;" oninput="updateSiteColor(this.value)">
    </div>

    <nav>
        <a href="index.html" class="logo">KAREEM.DSGN</a>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a> 
            <a href="works.html" class="active">أعمالي</a>
            <a href="about.html">عني</a>
            <a href="contact.html">تواصل معي</a>
        </div>
    </nav>

    <header class="works-header">
        <h1 data-aos="fade-left">MY <span style="color: var(--primary);">PROJECTS</span></h1>
        <p style="color: var(--text-dim);">هنا تجد نتاج شغفي في التصميم الجرافيكي والهويات البصرية.</p>
    </header>

    <section class="work-section">
        <div class="grid" id="projectsGrid">
            </div>
    </section>

    <footer><p>© 2026 KAREEM DESIGN.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        // قائمة الصور التي أرسلتها
        const images = [
            "LAST/Green HoOdy design 2.jpg", "LAST/hoodie design.jpg", "LAST/My pack-051.jpg",
            "LAST/Orange juice.jpg", "LAST/SHOES1.jpg", "LAST/burber.jpg",
            "LAST/burger 2.jpg", "LAST/competition 1.jpg", "LAST/eid adha 2025.jpg",
            "LAST/eid farha 2026.jpg", "LAST/eid farha(1).jpg", "LAST/fanta ad-Recovered.jpg",
            "LAST/fanta ad2.jpg", "LAST/nike ad.jpg", "LAST/nike yellow shoes.jpg",
            "LAST/nike.jpg", "LAST/ramdan 2026.jpg", "LAST/ramdan 2026 2.jpg",
            "LAST/ramdan 2026 3.jpg", "LAST/ramdan 2026 4.jpg", "LAST/ramdan 2026 5.jpg",
            "LAST/spark energy drink.jpg", "LAST/v7 ad ثيهف 2.jpg"
        ];

        const grid = document.getElementById('projectsGrid');

        // توليد الكروت أوتوماتيكياً
        images.forEach((src, index) => {
            const fileName = src.split('/').pop().split('.')[0].replace(/%20/g, ' ');
            const card = `
                <div class="card" data-aos="fade-up" data-aos-delay="${(index % 3) * 100}">
                    <div class="image-box">
                        <img src="${src}" alt="${fileName}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <h3>${fileName.toUpperCase()}</h3>
                        <p>Graphic Design</p>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });

        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedColor = localStorage.getItem('userThemeColor');
            if (savedColor) {
                updateSiteColor(savedColor);
                if(document.getElementById('fullColorPicker')) {
                    document.getElementById('fullColorPicker').value = savedColor;
                }
            }
        });

        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
        
        // تفاعل الماوس مع العناصر
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, .card')) {
                cursor.style.transform += ' scale(1.5)';
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('a, button, .card')) {
                cursor.style.transform = cursor.style.transform.replace(' scale(1.5)', '');
            }
        });
    </script>
</body>
</html>
