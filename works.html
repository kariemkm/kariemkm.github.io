<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem | My Works</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* إخفاء الماوس الأصلي تماماً */
        html, body, a, button, .card { cursor: none !important; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* ستايل الماوس الحقيقي المخصص */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 28px;
            height: 28px;
            pointer-events: none;
            z-index: 100000;
            filter: drop-shadow(0 0 5px var(--primary-glow));
            transition: transform 0.1s ease-out;
        }

        /* التحكم في لون السهم والبورد */
        #cursor-path {
            fill: var(--primary); /* لون الماوس بيتغير مع الموقع */
            stroke: #ffffff;      /* بوردر أبيض عشان يبان */
            stroke-width: 1.5px;
            transition: fill 0.3s ease;
        }

        nav {
            padding: 25px 8%; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%; z-index: 1000;
            background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(160, 32, 240, 0.1);
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; opacity: 0.7; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); opacity: 1; }

        .works-header { padding: 150px 8% 50px; text-align: right; }
        .works-header h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; margin-bottom: 10px; }

        .work-section { padding: 50px 8% 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid #151515; transition: 0.5s; }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); }
        .image-box { height: 350px; background: #111; overflow: hidden; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 25px; }

        .settings-panel {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 260px; background: #0a0a0a; border: 1px solid var(--primary);
            padding: 25px; z-index: 10001; transition: 0.4s; border-radius: 0 15px 15px 0;
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -45px; top: 0; width: 45px; height: 45px;
            background: var(--primary); border: none; color: white; border-radius: 0 10px 10px 0;
        }
        .custom-color-input { width: 100%; height: 40px; border: none; background: none; cursor: pointer; margin-top: 10px; }

        footer { padding: 40px; text-align: center; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" />
        </svg>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h3 style="color: var(--primary); margin-bottom: 20px;">تخصيص الموقع</h3>
        <input type="color" id="fullColorPicker" class="custom-color-input" value="#a020f0" oninput="updateSiteColor(this.value)">
    </div>

    <nav>
        <a href="index.html" class="logo">KAREEM.DSGN</a>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a> 
            <a href="works.html" class="active">أعمالي</a>
            <a href="about.html">عني</a>
            <a href="contact.html">تواصل معي</a>
        </div>
    </nav>

    <header class="works-header">
        <h1 data-aos="fade-left">MY <span style="color: var(--primary);">PROJECTS</span></h1>
        <p style="color: var(--text-dim);">استعراض لمشاريع التصميم المفضلة لدي.</p>
    </header>

    <section class="work-section">
        <div class="grid">
            <div class="card" data-aos="fade-up">
                <div class="image-box"><img src="https://via.placeholder.com/600x800"></div>
                <div class="card-info"><h3>Strategic Identity</h3><p>Branding</p></div>
            </div>
            <div class="card" data-aos="fade-up" data-aos-delay="200">
                <div class="image-box"><img src="https://via.placeholder.com/600x800"></div>
                <div class="card-info"><h3>Digital Art</h3><p>Concept Design</p></div>
            </div>
        </div>
    </section>

    <footer><p>© 2026 KAREEM DESIGN.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedColor = localStorage.getItem('userThemeColor');
            if (savedColor) {
                updateSiteColor(savedColor);
                if(document.getElementById('fullColorPicker')) {
                    document.getElementById('fullColorPicker').value = savedColor;
                }
            }
        });

        // كود تحريك الماوس الحقيقي
        const cursor = document.getElementById('custom-cursor');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
        
        // تأثير الماوس عند الوقوف على الروابط
        document.querySelectorAll('a, button, .card').forEach(el => {
            el.onmouseenter = () => { cursor.style.transform += ' scale(1.4)'; };
            el.onmouseleave = () => { cursor.style.transform = cursor.style.transform.replace(' scale(1.4)', ''); };
        });
    </script>
</body>
</html>
