<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem | Contact</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #030303; 
            --primary: #a020f0; 
            --primary-glow: rgba(160, 32, 240, 0.3); 
            --text-main: #ffffff; 
            --text-dim: #888; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* إخفاء الماوس الأصلي */
        html, body, a, button, input, textarea { cursor: none !important; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }

        /* ستايل الماوس المخصص (السهم) */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 28px;
            height: 28px;
            pointer-events: none;
            z-index: 100000;
            filter: drop-shadow(0 0 5px var(--primary-glow));
            transition: transform 0.1s ease-out;
        }

        #cursor-path {
            fill: var(--primary);
            stroke: #ffffff;
            stroke-width: 1.5px;
            transition: fill 0.3s ease;
        }

        nav { 
            padding: 25px 8%; display: flex; justify-content: space-between; 
            align-items: center; position: fixed; width: 100%; z-index: 1000; 
            background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(160, 32, 240, 0.1); 
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; opacity: 0.7; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); opacity: 1; }

        .contact-container { padding: 180px 8% 100px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px; }
        .info-box h2 { font-size: 3rem; margin-bottom: 20px; }
        .social-links { display: flex; gap: 20px; margin-top: 30px; }
        .social-links a { font-size: 1.5rem; color: var(--text-main); transition: 0.3s; }
        .social-links a:hover { color: var(--primary); transform: translateY(-5px); }

        form { background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid #151515; }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-dim); }
        input, textarea { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: white; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }

        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .submit-btn:hover { box-shadow: 0 0 20px var(--primary-glow); transform: scale(1.02); }

        @media (max-width: 900px) { .contact-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" />
        </svg>
    </div>

    <nav>
        <a href="index.html" class="logo">KAREEM.DSGN</a>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="works.html">أعمالي</a>
            <a href="about.html">عني</a>
            <a href="contact.html" class="active">تواصل معي</a>
        </div>
    </nav>

    <div class="contact-container">
        <div class="info-box" data-aos="fade-up">
            <h2>لنعمل <span style="color: var(--primary);">معاً</span>.</h2>
            <p style="color: var(--text-dim);">لديك فكرة مشروع؟ أو تريد فقط إلقاء التحية؟ لا تتردد في التواصل معي.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-behance"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
        <form data-aos="fade-up" data-aos-delay="200">
            <div class="input-group">
                <label>الاسم بالكامل</label>
                <input type="text" placeholder="مثلاً: كريم محمد">
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>رسالتك</label>
                <textarea rows="5" placeholder="اكتب تفاصيل مشروعك هنا..."></textarea>
            </div>
            <button type="submit" class="submit-btn">إرسال الرسالة</button>
        </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        const cursor = document.getElementById('custom-cursor');

        // تحديث اللون من الذاكرة
        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedColor = localStorage.getItem('userThemeColor');
            if (savedColor) updateSiteColor(savedColor);
        });

        // حركة الماوس
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // تأثيرات التفاعل
        document.querySelectorAll('a, button, input, textarea').forEach(el => {
            el.onmouseenter = () => { cursor.style.transform += ' scale(1.5)'; };
            el.onmouseleave = () => { cursor.style.transform = cursor.style.transform.replace(' scale(1.5)', ''); };
        });
    </script>
</body>
</html>
