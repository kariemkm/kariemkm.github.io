<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem Portfolio | Contact Me</title>
    
    <!-- إجبار المتصفح على طلب أحجام كبيرة وعالية الدقة من الأيقونة لتبدو واضحة وبأقصى حجم متاح -->
    <link rel="icon" type="image/png" sizes="192x192" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="96x96" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="48x48" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./LAST/logo.png?v=2.0">
    <link rel="shortcut icon" type="image/x-icon" href="./LAST/logo.png?v=2.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./LAST/logo.png?v=2.0">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتغيرات الأساسية (الوضع الداكن هو الافتراضي) */
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --card-bg: #0a0a0a;
            --item-bg: #0d0d0d;
            --input-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #888;
            --nav-bg: rgba(3, 3, 3, 0.9);
            --nav-height: 90px;
            --border-color: rgba(160, 32, 240, 0.1);
        }

        /* متغيرات الوضع الفاتح */
        [data-theme="light"] {
            --bg: #f5f5f5;
            --text-main: #1a1a1a;
            --text-dim: #555;
            --nav-bg: rgba(245, 245, 245, 0.9);
            --card-bg: #ffffff;
            --item-bg: #eeeeee;
            --input-bg: #fdfdfd;
            --border-color: #dddddd;
        }

        /* --- وضع التركيز المطور (Focus Mode) --- */
        body.focus-active .contact-header, 
        body.focus-active .social-grid,
        body.focus-active footer,
        body.focus-active nav,
        body.focus-active .settings-panel {
            opacity: 0.05;
            filter: blur(8px);
            pointer-events: none;
        }
        body.focus-active .contact-section { padding-top: 20px; }
        body.focus-active .contact-card { 
            border-color: var(--primary); 
            box-shadow: 0 0 35px var(--primary-glow);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        
        @media (min-width: 1025px) {
            html.custom-cursor-active, html.custom-cursor-active * { cursor: none !important; }
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- المؤشر الموحد بدقة --- */
        #cursor-container {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100000;
            transition: transform 0.08s ease-out;
            display: none;
        }
        .cursor-lens {
            width: 50px; height: 50px;
            border: 2px solid var(--text-main);
            border-radius: 50%;
            mix-blend-mode: difference;
        }
        .cursor-arrow { width: 35px; height: 35px; filter: drop-shadow(0 0 8px var(--primary)); }
        #cursor-path { fill: var(--primary); stroke: #fff; stroke-width: 1.5px; }

        /* --- شريط التنقل الموحد --- */
        nav {
            height: var(--nav-height);
            padding: 0 4%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(160, 32, 240, 0.2);
        }

        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            text-decoration: none;
        }
        
        .logo-img {
            display: block !important;
            height: 65px; 
            width: auto;
            max-width: 260px; 
            object-fit: contain;
        }

        .logo-text { 
            font-size: 1.3rem; 
            font-weight: 900; 
            color: var(--text-main); 
            letter-spacing: 0.5px;
            white-space: nowrap; 
        }

        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 1rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .menu-toggle { display: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; }

        /* --- الهيدر --- */
        .contact-header { 
            padding: calc(var(--nav-height) + 40px) 4% 30px; 
            text-align: right;
            background: linear-gradient(to bottom, var(--primary-glow) 0%, var(--bg) 100%);
        }
        .contact-header h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 900; line-height: 1.2; }

        /* --- قسم التواصل والـ Form --- */
        .contact-section { padding: 20px 4% 100px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
        
        .contact-card {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.4s ease;
        }
        .contact-card:hover { border-color: var(--primary); box-shadow: 0 15px 35px var(--primary-glow); }

        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-main); font-weight: 600; }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        .form-group textarea { resize: vertical; min-height: 150px; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--primary);
            background: #b23bf7;
        }

        /* --- شبكة منصات التواصل الاجتماعي --- */
        .social-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 700px;
        }
        .social-item {
            flex: 1;
            min-width: 130px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.4s ease;
        }
        .social-item i { font-size: 2rem; margin-bottom: 10px; display: block; transition: 0.3s; }
        .social-item span { font-size: 0.85rem; font-weight: 600; display: block; color: var(--text-dim); }
        
        /* ألوان النيون التفاعلية لكل منصة بشكل منفصل عند الـ Hover */
        .social-item.instagram:hover { border-color: #e1306c; box-shadow: 0 0 20px rgba(225,48,108,0.3); }
        .social-item.instagram:hover i { color: #e1306c; transform: scale(1.1); }
        
        .social-item.behance:hover { border-color: #0057ff; box-shadow: 0 0 20px rgba(0,87,255,0.3); }
        .social-item.behance:hover i { color: #0057ff; transform: scale(1.1); }

        .social-item.pinterest:hover { border-color: #bd081c; box-shadow: 0 0 20px rgba(189,8,28,0.3); }
        .social-item.pinterest:hover i { color: #bd081c; transform: scale(1.1); }

        .social-item.whatsapp:hover { border-color: #25d366; box-shadow: 0 0 20px rgba(37,211,102,0.3); }
        .social-item.whatsapp:hover i { color: #25d366; transform: scale(1.1); }

        /* --- لوحة التحكم الموحدة --- */
        .settings-panel {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 260px; background: var(--card-bg); border: 1px solid var(--primary);
            padding: 20px; z-index: 10001; transition: 0.4s; border-radius: 0 15px 15px 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -40px; top: 0; width: 40px; height: 40px;
            background: var(--primary); border: none; color: white; border-radius: 0 8px 8px 0; cursor: pointer;
        }
        .setting-row { margin-bottom: 15px; }
        .setting-btn {
            width: 100%; padding: 8px; background: rgba(160,32,240,0.1); 
            border: 1px solid var(--primary); color: var(--text-main);
            border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem;
        }

        @media (max-width: 1024px) {
            .menu-toggle { display: block; }
            .nav-links {
                position: fixed; top: var(--nav-height); right: -100%; width: 80%; height: 100vh;
                background: var(--bg); flex-direction: column; padding: 50px 30px; transition: 0.4s;
                border-left: 1px solid var(--primary);
            }
            .nav-links.active { right: 0; }
            .contact-header { text-align: center; }
            .contact-card { padding: 25px 20px; }
        }

        footer { padding: 40px; text-align: center; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div id="cursor-container"></div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h4 style="color: var(--primary); margin-bottom: 15px;">تخصيص الواجهة</h4>
        
        <div class="setting-row">
            <label style="font-size: 0.75rem; color: var(--text-dim);">النمط العام:</label>
            <button class="setting-btn" onclick="toggleTheme()">
                <span id="theme-text">الوضع الداكن</span>
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.75rem; color: var(--text-dim);">وضع التركيز:</label>
            <button class="setting-btn" onclick="toggleFocusMode()">
                <span id="focus-status">تشغيل الوضع</span>
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.75rem; color: var(--text-dim);">لون الثيم:</label>
            <input type="color" id="fullColorPicker" style="width:100%; height:30px; border:none; background:none; cursor:pointer;" oninput="updateSiteColor(this.value)">
        </div>
        
        <div id="desktop-only-settings">
            <label style="font-size: 0.75rem; color: var(--text-dim);">شكل الماوس:</label>
            <div onclick="setCursor('arrow')" style="cursor:pointer; padding:8px; background:rgba(160,32,240,0.05); margin-top:5px; border-radius:5px; font-size:0.8rem;">سهم نيون</div>
            <div onclick="setCursor('lens')" style="cursor:pointer; padding:8px; background:rgba(160,32,240,0.05); margin-top:5px; border-radius:5px; font-size:0.8rem;">عدسة عاكسة</div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo-container">
            <img src="LAST/logo.png" alt="Kareem Logo" class="logo-img">
            <span class="logo-text">Kareem <span style="color: var(--primary);">Portfolio</span></span>
        </a>
        <div class="menu-toggle" id="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="nav-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="works.html">أعمالي</a></li>
            <li><a href="about.html">عني</a></li>
            <li><a href="contact.html" class="active">تواصل معي</a></li>
        </ul>
    </nav>

    <header class="contact-header">
        <h1 data-aos="fade-left">LET'S <span style="color: var(--primary);">TALK</span></h1>
        <p style="color: var(--text-dim); margin-top: 10px;">لديك فكرة مشروع مميزة؟ لنبدأ العمل معاً ونصنع شيئاً مذهلاً.</p>
    </header>

    <section class="contact-section">
        <!-- كارت فورم المراسلة -->
        <div class="contact-card" data-aos="zoom-in">
            <form id="contactForm" onsubmit="event.preventDefault(); alert('تم إرسال رسالتك بنجاح يا كريم!');">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" placeholder="اكتب اسمك الكريم هنا..." required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label>تفاصيل الرسالة</label>
                    <textarea placeholder="اشرح فكرتك أو مشروعك بالتفصيل هنا..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">إرسال الرسالة الآن <i class="fas fa-paper-plane" style="margin-right: 5px;"></i></button>
            </form>
        </div>

        <!-- شبكة قنوات التواصل الاجتماعي -->
        <div class="social-grid" data-aos="fade-up" data-aos-delay="200">
            <!-- ضع الروابط الخاصة بك بداخل الـ href بدلاً من # -->
            <a href="#" target="_blank" class="social-item instagram">
                <i class="fab fa-instagram"></i>
                <span>انستغرام</span>
            </a>
            <a href="#" target="_blank" class="social-item behance">
                <i class="fab fa-behance"></i>
                <span>بيهانس</span>
            </a>
            <a href="#" target="_blank" class="social-item pinterest">
                <i class="fab fa-pinterest"></i>
                <span>بينتريست</span>
            </a>
            <a href="#" target="_blank" class="social-item whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>واتساب</span>
            </a>
        </div>
    </section>

    <footer><p>© 2026 KAREEM DESIGN. All Rights Reserved.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // --- ميزة تبديل الثيم ---
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            updateThemeUI(targetTheme);
        }

        function updateThemeUI(theme) {
            const text = document.getElementById('theme-text');
            const icon = document.getElementById('theme-icon');
            if (theme === 'light') {
                text.innerText = "الوضع الفاتح";
                icon.className = "fas fa-sun";
            } else {
                text.innerText = "الوضع الداكن";
                icon.className = "fas fa-moon";
            }
        }

        // --- وضع التركيز (Focus Mode) التفاعلي والذكي بالـ Escape ---
        let isFocusActive = false;
        function toggleFocusMode() {
            isFocusActive = !isFocusActive;
            document.body.classList.toggle('focus-active');
            const statusText = document.getElementById('focus-status');
            statusText.innerText = isFocusActive ? "إلغاء وضع التركيز" : "تشغيل الوضع";
            
            if(isFocusActive) {
                const escHandler = (e) => {
                    if (e.key === 'Escape') {
                        toggleFocusMode();
                        document.removeEventListener('keydown', escHandler);
                    }
                };
                document.addEventListener('keydown', escHandler);
            }
        }

        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
        }

        // --- الماوس المخصص الموحد ---
        let currentCursorMode = localStorage.getItem('cursorMode') || 'arrow';
        const cursorContainer = document.getElementById('cursor-container');
        const isMobile = window.matchMedia("(max-width: 1024px)").matches;

        function setCursor(mode) {
            if (isMobile) return;
            currentCursorMode = mode;
            localStorage.setItem('cursorMode', mode);
            document.documentElement.classList.add('custom-cursor-active');
            cursorContainer.style.display = 'block';
            renderCursor(mode);
        }

        function renderCursor(mode) {
            if (mode === 'lens') {
                cursorContainer.innerHTML = '<div class="cursor-lens"></div>';
            } else {
                cursorContainer.innerHTML = `<svg class="cursor-arrow" viewBox="0 0 24 24"><path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" /></svg>`;
            }
        }

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                cursorContainer.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            });
        }

        // عند التحميل
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);

            const savedColor = localStorage.getItem('userThemeColor');
            if (savedColor) {
                updateSiteColor(savedColor);
                if(document.getElementById('fullColorPicker')) document.getElementById('fullColorPicker').value = savedColor;
            }
            
            setCursor(currentCursorMode);
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
        document.getElementById('mobile-menu-btn').onclick = () => {
            document.getElementById('nav-menu').classList.toggle('active');
        };
    </script>
</body>
</html>
