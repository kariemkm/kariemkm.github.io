<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem | Creative Portfolio</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        /* الأساسيات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, * { cursor: none !important; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* العدسة (الماوس المخصص) */
        #lens {
            width: 25px; height: 25px; background-color: white;
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 100000; mix-blend-mode: difference;
            transition: transform 0.15s ease-out, opacity 0.3s;
        }

        /* الهيدر */
        nav {
            padding: 30px 8%; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%; z-index: 1000;
            background: rgba(3, 3, 3, 0.7); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(160, 32, 240, 0.1);
        }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; color: var(--primary); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        /* قسم الهيرو */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at 50% 50%, #0f0514 0%, #030303 100%);
            padding: 0 15%;
        }
        .hero h1 { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 900; margin-bottom: 15px; }
        .hero p { color: var(--text-dim); font-size: 1.1rem; }

        /* لوحة التحكم (الإعدادات) */
        .settings-panel {
            position: fixed; left: -240px; top: 50%; transform: translateY(-50%);
            width: 240px; background: #0a0a0a; border: 1px solid var(--primary);
            padding: 25px; z-index: 10001; transition: 0.4s; border-radius: 0 15px 15px 0;
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -45px; top: 0; width: 45px; height: 45px;
            background: var(--primary); border: none; color: white; border-radius: 0 10px 10px 0;
        }

        /* كروت المشاريع */
        .work-section { padding: 100px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid #151515; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 10px 30px var(--primary-glow); }
        .image-box { width: 100%; height: 400px; overflow: hidden; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }

        /* الـ Popup */
        .popup-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 99999;
        }
        .popup-content {
            width: 90%; max-width: 900px; margin: 5vh auto; background: #080808;
            border: 1px solid var(--primary); border-radius: 20px; padding: 40px;
            position: relative; animation: popShow 0.3s ease;
        }
        @keyframes popShow { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .popup-grid { grid-template-columns: 1fr; } }
        .popup-img img { width: 100%; border-radius: 12px; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 40px; color: var(--primary); }

        footer { padding: 60px; text-align: center; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="lens"></div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h3 style="font-size: 1.1rem; margin-bottom: 20px; color: var(--primary);">تخصيص الواجهة</h3>
        
        <div style="margin-bottom: 20px;">
            <p style="font-size: 0.85rem; margin-bottom: 10px;">ثيم الهوية:</p>
            <div style="display: flex; gap: 12px;">
                <div onclick="changeColor('#a020f0')" style="width: 25px; height: 25px; border-radius: 50%; background: #a020f0; border: 2px solid #fff;"></div>
                <div onclick="changeColor('#00ffcc')" style="width: 25px; height: 25px; border-radius: 50%; background: #00ffcc;"></div>
                <div onclick="changeColor('#ff0055')" style="width: 25px; height: 25px; border-radius: 50%; background: #ff0055;"></div>
            </div>
        </div>

        <div style="border-top: 1px solid #222; padding-top: 20px;">
            <p style="font-size: 0.85rem; margin-bottom: 10px;">وضع العدسة:</p>
            <button id="toggleLensBtn" onclick="toggleLens()" style="background: #111; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 8px; width: 100%; font-size: 0.8rem; transition: 0.3s;">
                إيقاف العدسة
            </button>
        </div>
    </div>

    <nav>
        <div class="logo">KAREEM.DSGN</div>
        <div class="nav-links">
            <a href="#">الرئيسية</a>
            <a href="#work">أعمالي</a>
            <a href="#">عني</a>
            <a href="#">تواصل معي</a>
        </div>
    </nav>

    <section class="hero">
        <h1 data-aos="fade-up">Creative <br> Visual Designer</h1>
        <p data-aos="fade-up" data-aos-delay="200">تصميم بصري بلمسة فنية فريدة.</p>
    </section>

    <section class="work-section" id="work">
        <div class="grid">
            <div class="card" data-aos="fade-up" onclick="openPopup('Strategic Identity', 'https://via.placeholder.com/600x800', 'شرح تفصيلي للمشروع الأول...')">
                <div class="image-box"><img src="https://via.placeholder.com/600x800"></div>
                <div class="card-info"><h3>Strategic Identity</h3><p>اضغط لعرض العدسة.</p></div>
            </div>
        </div>
    </section>

    <div id="projectPopup" class="popup-overlay">
        <div class="popup-content">
            <span class="close-btn" onclick="closePopup()">&times;</span>
            <div class="popup-grid">
                <div class="popup-img"><img id="modalImg" src=""></div>
                <div class="popup-info">
                    <h2 id="modalTitle" style="color: var(--primary); margin-bottom: 20px;"></h2>
                    <p id="modalDesc" style="color: #ccc;"></p>
                </div>
            </div>
        </div>
    </div>

    <footer><p>© 2026 KAREEM DESIGN.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        const lens = document.getElementById('lens');
        const lensBtn = document.getElementById('toggleLensBtn');
        let lensActive = true;

        document.addEventListener('mousemove', (e) => {
            if (lensActive) {
                lens.style.left = e.clientX - 12 + 'px';
                lens.style.top = e.clientY - 12 + 'px';
            }
        });

        function toggleLens() {
            lensActive = !lensActive;
            if (lensActive) {
                lens.style.display = 'block';
                document.querySelectorAll('*').forEach(el => el.style.setProperty('cursor', 'none', 'important'));
                lensBtn.innerText = "إيقاف العدسة";
                lensBtn.style.background = "#111";
            } else {
                lens.style.display = 'none';
                document.querySelectorAll('*').forEach(el => el.style.setProperty('cursor', 'auto', 'important'));
                lensBtn.innerText = "تشغيل العدسة";
                lensBtn.style.background = "var(--primary)";
            }
        }

        document.querySelectorAll('a, .card, button, .close-btn').forEach(el => {
            el.onmouseenter = () => { if(lensActive) lens.style.transform = 'scale(4)'; };
            el.onmouseleave = () => { if(lensActive) lens.style.transform = 'scale(1)'; };
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');

        function changeColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
        }

        function openPopup(title, img, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('projectPopup').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closePopup() {
            document.getElementById('projectPopup').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
