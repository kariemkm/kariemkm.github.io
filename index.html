<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بورتفوليو احترافي | 2026</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* كل التنسيق هنا عشان مفيش حاجة تضيع */
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* الماوس المضيء */
        #cursor {
            width: 12px; height: 12px; background: var(--primary);
            border-radius: 50%; position: fixed; z-index: 9999;
            pointer-events: none; box-shadow: 0 0 20px var(--primary);
            transition: transform 0.1s; mix-blend-mode: difference;
        }

        /* خلفية متحركة بجد */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
        }

        .blob {
            position: absolute; width: 400px; height: 400px;
            background: linear-gradient(var(--primary), var(--secondary));
            filter: blur(100px); border-radius: 50%; opacity: 0.15;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(30%, 30%) scale(1.2); }
        }

        /* الهيدر */
        nav {
            padding: 25px 10%; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; }

        /* منطقة الترحيب */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; line-height: 1.1;
        }

        .gradient-text {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* كروت اللغات (C++, PHP, JS) */
        .container { padding: 100px 10%; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; margin-top: 50px;
        }

        .skill-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 25px; transition: 0.5s;
            position: relative; overflow: hidden; text-align: center;
        }

        .skill-card:hover {
            transform: translateY(-15px); border-color: var(--primary);
            background: rgba(255,255,255,0.07);
        }

        .skill-card i { font-size: 3.5rem; margin-bottom: 20px; color: var(--primary); }

        .btn {
            margin-top: 30px; padding: 15px 40px; border: 1px solid var(--primary);
            background: transparent; color: var(--primary); border-radius: 50px;
            font-weight: bold; transition: 0.3s;
        }

        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="bg-animate"><div class="blob"></div></div>

    <nav>
        <div class="logo">PORTFOLIO.26</div>
    </nav>

    <section class="hero">
        <h1 data-aos="fade-down">كود <span class="gradient-text">بلا حدود</span></h1>
        <p data-aos="fade-up" data-aos-delay="300" style="font-size: 1.2rem; color: #ccc;">خبير في تطوير الأنظمة بـ C++ والويب بـ PHP & JS</p>
        <div data-aos="zoom-in" data-aos-delay="500">
            <button class="btn">استكشف مشاريعي</button>
        </div>
    </section>

    <section class="container">
        <h2 style="text-align: center; font-size: 2.5rem;" data-aos="fade-up">اللغات التي أتقنها</h2>
        <div class="grid">
            <div class="skill-card" data-aos="flip-left">
                <i class="fas fa-terminal"></i>
                <h3>C++ Development</h3>
                <p>تطوير برمجيات الأنظمة والأداء العالي.</p>
            </div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="200">
                <i class="fab fa-php"></i>
                <h3>PHP Backend</h3>
                <p>بناء بوابات إلكترونية وقواعد بيانات ذكية.</p>
            </div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="400">
                <i class="fab fa-js"></i>
                <h3>Modern JS</h3>
                <p>واجهات مستخدم تفاعلية وأنيميشن متقدم.</p>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });

        // الماوس
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // تأثير تكبير الماوس
        document.querySelectorAll('.skill-card, .btn').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(4)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
        });
    </script>
</body>
</html>
