<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio 2026</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        #cursor { width: 20px; height: 20px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 999; mix-blend-mode: difference; transition: transform 0.1s; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        h1 { font-size: 5rem; text-transform: uppercase; letter-spacing: 5px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; margin: 20px; transition: 0.3s; }
        .glass:hover { transform: translateY(-10px); border-color: var(--primary); }
        .btn { padding: 15px 40px; border: 1px solid var(--primary); color: var(--primary); text-decoration: none; border-radius: 50px; transition: 0.3s; margin-top: 20px; display: inline-block; }
        .btn:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <section class="hero">
        <h1 data-aos="zoom-in">CREATIVE<br><span style="color:var(--primary)">PORTFOLIO</span></h1>
        <p data-aos="fade-up" data-aos-delay="300">أهلاً بك في تجربة بصرية فريدة</p>
        <a href="#" class="btn" data-aos="fade-up" data-aos-delay="500">استكشف المشاريع</a>
    </section>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); padding: 50px;">
        <div class="glass" data-aos="fade-right"><h3>مشروع 01</h3><p>تصميم واجهات احترافية</p></div>
        <div class="glass" data-aos="fade-up"><h3>مشروع 02</h3><p>تطوير تطبيقات ويب</p></div>
        <div class="glass" data-aos="fade-left"><h3>مشروع 03</h3><p>تجربة مستخدم مبتكرة</p></div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
