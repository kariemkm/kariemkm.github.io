<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem | Creative Visual Designer</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --text-main: #ffffff;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, * { cursor: none !important; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #lens {
            width: 25px; height: 25px; background-color: white;
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 100000; mix-blend-mode: difference;
            transition: transform 0.15s ease-out;
        }

        /* الهيدر الموحد لكل الصفحات */
        nav {
            padding: 25px 8%; display: flex; justify-content: space-between;
            align-items: center; position: fixed; width: 100%; z-index: 1000;
            background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(160, 32, 240, 0.1);
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a.active { color: var(--primary); font-weight: bold; }

        /* الهيرو */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at 50% 50%, #0f0514 0%, #030303 100%);
        }
        .hero h1 { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 900; margin-bottom: 20px; }
        
        /* تصحيح زرار الانتقال لصفحة الأعمال */
        .btn-main {
            padding: 15px 40px; background: var(--primary); color: white;
            text-decoration: none; border-radius: 50px; font-weight: bold;
            transition: 0.3s; border: none; box-shadow: 0 0 20px var(--primary-glow);
            margin-top: 20px; display: inline-block;
        }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 0 30px var(--primary); }

        /* لوحة الإعدادات */
        .settings-panel {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 260px; background: #0a0a0a; border: 1px solid var(--primary);
            padding: 25px; z-index: 10001; transition: 0.4s; border-radius: 0 15px 15px 0;
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -45px; top: 0; width: 45px; height: 45px;
            background: var(--primary); border: none; color: white; border-radius: 0 10px 10px 0;
        }
        .custom-color-input { width: 100%; height: 40px; border: none; background: none; cursor: pointer; margin-top: 10px; }

        footer { padding: 40px; text-align: center; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="lens"></div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h3 style="color: var(--primary); margin-bottom: 20px;">تخصيص الموقع</h3>
        <p style="font-size: 0.85rem;">اختر لونك بالكامل:</p>
        <input type="color" id="fullColorPicker" class="custom-color-input" value="#a020f0" oninput="updateSiteColor(this.value)">
        <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
            <button onclick="toggleLens()" id="toggleLensBtn" style="background: #111; color: #fff; border: 1px solid var(--primary); padding: 10px; border-radius: 8px; width: 100%;">إيقاف العدسة</button>
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo">KAREEM.DSGN</a>
        <div class="nav-links">
            <a href="index.html" class="active">الرئيسية</a>
            <a href="works.html">أعمالي</a>
            <a href="about.html">عني</a>
            <a href="contact.html">تواصل معي</a>
        </div>
    </nav>

    <section class="hero">
        <h1 data-aos="fade-up">Creative <br> Visual Designer</h1>
        <p data-aos="fade-up" data-aos-delay="200" style="color: var(--text-dim);">أهلاً بك، أنا كريم. أصمم تجارب بصريّة مبهرة.</p>
        <div data-aos="fade-up" data-aos-delay="400">
            <a href="works.html" class="btn-main">استعرض أعمالي</a>
        </div>
    </section>

    <footer><p>© 2026 KAREEM DESIGN.</p></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
        }

        const lens = document.getElementById('lens');
        let lensActive = true;
        document.addEventListener('mousemove', (e) => {
            if (lensActive) {
                lens.style.left = e.clientX - 12 + 'px';
                lens.style.top = e.clientY - 12 + 'px';
            }
        });

        function toggleLens() {
            lensActive = !lensActive;
            lens.style.display = lensActive ? 'block' : 'none';
            document.querySelectorAll('*').forEach(el => el.style.setProperty('cursor', lensActive ? 'none' : 'auto', 'important'));
            document.getElementById('toggleLensBtn').innerText = lensActive ? "إيقاف العدسة" : "تشغيل العدسة";
        }

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');

        document.querySelectorAll('a, button').forEach(el => {
            el.onmouseenter = () => { if(lensActive) lens.style.transform = 'scale(4)'; };
            el.onmouseleave = () => { if(lensActive) lens.style.transform = 'scale(1)'; };
        });
    </script>
</body>
</html>
