<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem Portfolio | Creative Designer</title>
    
    <link rel="icon" type="image/png" href="LAST/logo"> 

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --text-main: #ffffff;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* إخفاء الماوس الأصلي على الكمبيوتر فقط */
        @media (min-width: 1025px) {
            html.custom-cursor-active, html.custom-cursor-active * { cursor: none !important; }
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- ستايلات الماوس المخصص --- */
        #cursor-container {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100000;
            transition: transform 0.08s ease-out;
            display: none;
        }

        .cursor-lens {
            width: 50px; height: 50px;
            border: 2px solid #fff;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            mix-blend-mode: difference; /* عكس الألوان */
            z-index: 100001;
        }

        .cursor-arrow {
            width: 35px; height: 35px;
            filter: drop-shadow(0 0 8px var(--primary));
        }
        #cursor-path { fill: var(--primary); stroke: #fff; stroke-width: 1.5px; }

        /* --- الهيدر واللوجو --- */
        nav {
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; z-index: 1000; background: rgba(3, 3, 3, 0.9);
            backdrop-filter: blur(15px); border-bottom: 2px solid var(--primary);
        }

        .logo-container { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img-mask {
            width: 45px; height: 45px; background-color: var(--primary);
            -webkit-mask: url('LAST/logo') no-repeat center/contain;
            mask: url('LAST/logo') no-repeat center/contain;
        }
        .logo-text { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: 1px; }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 1rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* القائمة في الموبايل */
        .menu-toggle { display: none; font-size: 1.8rem; color: var(--primary); cursor: pointer; }

        @media (max-width: 1024px) {
            #cursor-container { display: none !important; }
            .menu-toggle { display: block; }
            .nav-links {
                position: fixed; top: 78px; right: -100%; width: 100%; height: calc(100vh - 78px);
                background: var(--bg); flex-direction: column; padding: 40px; transition: 0.4s;
                border-top: 1px solid var(--primary);
            }
            .nav-links.active { right: 0; }
            .nav-links a { font-size: 1.5rem; }
        }

        /* --- الهيرو سكشن --- */
        .hero {
            min-height: 100vh; padding: 150px 8% 50px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at 50% 50%, #0f0514 0%, #030303 100%);
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); line-height: 1.1; margin-bottom: 20px; }
        .highlight { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }

        /* --- الإعدادات --- */
        .settings-panel {
            position: fixed; left: -280px; top: 50%; transform: translateY(-50%);
            width: 280px; background: #0a0a0a; border: 1px solid var(--primary);
            padding: 25px; z-index: 10001; transition: 0.4s; border-radius: 0 15px 15px 0;
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -45px; top: 0; width: 45px; height: 45px;
            background: var(--primary); border: none; color: white; border-radius: 0 10px 10px 0;
        }

        .cursor-option {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px; margin-top: 10px; width: 100%; border-radius: 8px;
            text-align: right; cursor: pointer;
        }
        .cursor-option.active { border-color: var(--primary); background: var(--primary-glow); }

        .showcase-container { display: flex; gap: 30px; margin-top: 50px; justify-content: center; flex-wrap: wrap; }
        .neon-card { border-radius: 20px; overflow: hidden; background: #0a0a0a; width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        .neon-card img { width: 100%; height: 450px; object-fit: cover; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="cursor-container"></div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h3 style="color: var(--primary); margin-bottom: 15px;">تخصيص التجربة</h3>
        <label style="font-size: 0.8rem; color: var(--text-dim);">لون النظام:</label>
        <input type="color" id="fullColorPicker" style="width:100%; height:35px; margin-bottom: 20px;" oninput="updateSiteColor(this.value)">
        <div id="desktop-only-settings">
            <label style="font-size: 0.8rem; color: var(--text-dim);">شكل المؤشر:</label>
            <button class="cursor-option" onclick="setCursor('arrow')">سهم نيون ملون (أساسي)</button>
            <button class="cursor-option" onclick="setCursor('lens')">عدسة عاكسة للألوان</button>
            <button class="cursor-option" onclick="setCursor('default')">الماوس الطبيعي</button>
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo-container">
            <div class="logo-img-mask"></div>
            <span class="logo-text">KAREEM<span style="color: var(--primary);">.DSGN</span></span>
        </a>
        
        <div class="menu-toggle" id="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </div>

        <div class="nav-links" id="nav-menu">
            <a href="index.html" class="active">الرئيسية</a>
            <a href="works.html">أعمالي</a>
            <a href="about.html">عني</a>
            <a href="contact.html">تواصل معي</a>
        </div>
    </nav>

    <section class="hero">
        <h1 data-aos="fade-up">Professional <br> <span class="highlight">Graphic Designer</span></h1>
        <p data-aos="fade-up" data-aos-delay="200" style="color: var(--text-dim); max-width: 600px;">أهلاً بك، أنا كريم. أحول الأفكار المعقدة إلى تصاميم بصرية تخطف الأنظار.</p>
        
        <div class="showcase-container">
            <div class="neon-card" data-aos="zoom-in">
                <img src="LAST/hoodie design.jpg" alt="Design 1">
            </div>
            <div class="neon-card" data-aos="zoom-in" data-aos-delay="200">
                <img src="LAST/Green HoOdy design 2.jpg" alt="Design 2">
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        const cursorContainer = document.getElementById('cursor-container');
        const navMenu = document.getElementById('nav-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const isMobile = window.matchMedia("(max-width: 1024px)").matches;

        // القائمة في الموبايل
        mobileMenuBtn.onclick = () => {
            navMenu.classList.toggle('active');
            mobileMenuBtn.querySelector('i').classList.toggle('fa-bars');
            mobileMenuBtn.querySelector('i').classList.toggle('fa-times');
        };

        // إدارة الألوان
        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
        }

        // إدارة الماوس (الأساسي هو السهم النيون)
        let currentCursorMode = localStorage.getItem('cursorMode') || 'arrow';

        function setCursor(mode) {
            if (isMobile) return;
            currentCursorMode = mode;
            localStorage.setItem('cursorMode', mode);

            if (mode === 'default') {
                document.documentElement.classList.remove('custom-cursor-active');
                cursorContainer.style.display = 'none';
            } else {
                document.documentElement.classList.add('custom-cursor-active');
                cursorContainer.style.display = 'block';
                renderCursor(mode);
            }
        }

        function renderCursor(mode) {
            if (mode === 'lens') {
                cursorContainer.innerHTML = '<div class="cursor-lens"></div>';
            } else {
                cursorContainer.innerHTML = `<svg class="cursor-arrow" viewBox="0 0 24 24"><path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" /></svg>`;
            }
        }

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                if (currentCursorMode !== 'default') {
                    cursorContainer.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                }
            });
        } else {
            document.getElementById('desktop-only-settings').style.display = 'none';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedColor = localStorage.getItem('userThemeColor');
            if (savedColor) updateSiteColor(savedColor);
            setCursor(currentCursorMode);
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
    </script>
</body>
</html>
