<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem Portfolio | Creative Designer</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="96x96" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="48x48" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./LAST/logo.png?v=2.0">
    <link rel="shortcut icon" type="image/x-icon" href="./LAST/logo.png?v=2.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./LAST/logo.png?v=2.0">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتغيرات الأساسية (الوضع الداكن هو الافتراضي) */
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --text-main: #ffffff;
            --text-dim: #888;
            --nav-bg: rgba(3, 3, 3, 0.9);
            --nav-height: 90px; 
            --card-bg: #0a0a0a;
        }

        /* متغيرات الوضع الفاتح */
        [data-theme="light"] {
            --bg: #f5f5f5;
            --text-main: #1a1a1a;
            --text-dim: #555;
            --nav-bg: rgba(245, 245, 245, 0.9);
            --card-bg: #ffffff;
        }

        /* وضع التركيز (Focus Mode) المطور */
        body.focus-active .showcase-container, 
        body.focus-active nav, 
        body.focus-active .btn-container,
        body.focus-active .hero p {
            opacity: 0.08;
            filter: blur(8px);
            pointer-events: none;
        }
        body.focus-active .hero h1 { transform: scale(1.05); }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        
        @media (min-width: 1025px) {
            html.custom-cursor-active, html.custom-cursor-active * { cursor: none !important; }
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- الماوس المطور بسلاسة هاردوير --- */
        #cursor-container {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100000;
            display: none;
            will-change: transform;
        }
        .cursor-lens {
            width: 50px; height: 50px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%); /* لضبط السنتر */
            box-shadow: 0 0 10px var(--primary-glow);
        }
        .cursor-arrow { 
            width: 35px; height: 35px; 
            filter: drop-shadow(0 0 8px var(--primary)); 
            transform: translate(-15%, -15%); /* لضبط السنتر مع السهم */
        }
        #cursor-path { fill: var(--primary); stroke: #fff; stroke-width: 1.5px; }

        /* --- ضبط هيدر الـ تباعد الحواف والمحاذاة --- */
        nav {
            height: var(--nav-height);
            padding: 0 5%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(160, 32, 240, 0.15);
        }

        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
        }
        
        .logo-img {
            display: block !important;
            height: 55px; 
            width: auto;
            max-width: 260px; 
            object-fit: contain;
        }

        .logo-text { 
            font-size: 1.3rem; 
            font-weight: 900; 
            color: var(--text-main); 
            letter-spacing: 0.5px;
            white-space: nowrap; 
        }

        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 1rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .menu-toggle { display: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; }

        /* --- الهيرو --- */
        .hero {
            min-height: 100vh;
            padding: calc(var(--nav-height) + 60px) 5% 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, var(--bg) 80%);
        }
        .hero h1 { font-size: clamp(2.4rem, 7vw, 5rem); line-height: 1.2; max-width: 1000px; font-weight: 800; transition: transform 0.5s ease; }
        .highlight { color: var(--primary); text-shadow: 0 0 25px var(--primary-glow); }
        .hero p { color: var(--text-dim); max-width: 600px; margin: 20px auto; font-size: clamp(0.95rem, 2vw, 1.15rem); }

        /* --- معرض الأعمال الموزون لمنع التمدد المشوه --- */
        .showcase-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 340px));
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            margin-top: 40px;
        }
        .neon-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid rgba(160,32,240,0.15);
            aspect-ratio: 3/4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .neon-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 25px var(--primary-glow);
            transform: translateY(-5px);
        }
        .neon-card:hover img { transform: scale(1.05); filter: brightness(1.05); }

        /* --- الأزرار --- */
        .btn-container { margin-top: 50px; display: flex; justify-content: center; }
        .view-more-btn {
            position: relative; padding: 14px 38px;
            background: rgba(160, 32, 240, 0.05);
            border: 1px solid var(--primary);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            overflow: hidden;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 12px;
        }
        .view-more-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 25px var(--primary);
            transform: translateY(-4px);
            color: #fff;
        }

        /* --- الإعدادات الجانبية --- */
        .settings-panel {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 260px; background: var(--card-bg); border: 1px solid var(--primary);
            padding: 20px; z-index: 10001; transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0 15px 15px 0;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -40px; top: 0; width: 40px; height: 40px;
            background: var(--primary); border: none; color: white; border-radius: 0 8px 8px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .setting-row { margin-bottom: 15px; }
        .setting-btn {
            width: 100%; padding: 10px; background: rgba(160,32,240,0.08); 
            border: 1px solid rgba(160,32,240,0.3); color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
        }
        .setting-btn:hover { background: rgba(160,32,240,0.15); border-color: var(--primary); }

        @media (max-width: 1024px) {
            .menu-toggle { display: block; }
            .nav-links {
                position: fixed; top: var(--nav-height); right: -100%; width: 75%; height: calc(100vh - var(--nav-height));
                background: var(--bg); flex-direction: column; padding: 40px 30px; transition: right 0.4s ease;
                border-left: 1px solid rgba(160, 32, 240, 0.2);
            }
            .nav-links.active { right: 0; }
            .showcase-container { grid-template-columns: 1fr; max-width: 320px; }
        }
    </style>
</head>
<body>

    <div id="cursor-container"></div>

    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h4 style="color: var(--primary); margin-bottom: 15px; font-weight: 700;">تخصيص الواجهة</h4>
        
        <div class="setting-row">
            <label style="font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px;">النمط العام:</label>
            <button class="setting-btn" onclick="toggleTheme()">
                <span id="theme-text">الوضع الداكن</span>
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px;">وضع التركيز:</label>
            <button class="setting-btn" onclick="toggleFocusMode()">
                <span id="focus-text">تشغيل الوضع</span>
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px;">لون الثيم:</label>
            <input type="color" id="fullColorPicker" style="width:100%; height:32px; border:none; background:none; cursor:pointer;" oninput="updateSiteColor(this.value)">
        </div>

        <div id="desktop-only-settings">
            <label style="font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px;">شكل الماوس:</label>
            <div onclick="setCursor('arrow')" style="cursor:pointer; padding:8px; background:rgba(160,32,240,0.05); margin-top:5px; border-radius:5px; font-size:0.8rem; font-weight:600;">سهم نيون</div>
            <div onclick="setCursor('lens')" style="cursor:pointer; padding:8px; background:rgba(160,32,240,0.05); margin-top:5px; border-radius:5px; font-size:0.8rem; font-weight:600;">عدسة عاكسة</div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo-container">
            <img src="LAST/logo.png" alt="Kareem Logo" class="logo-img">
            <span class="logo-text">Kareem <span style="color: var(--primary);">Portfolio</span></span>
        </a>
        <div class="menu-toggle" id="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="nav-menu">
            <li><a href="index.html" class="active">الرئيسية</a></li>
            <li><a href="works.html">أعمالي</a></li>
            <li><a href="about.html">عني</a></li>
            <li><a href="contact.html">تواصل معي</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1 data-aos="fade-up">Professional <br> <span class="highlight">Graphic Designer</span></h1>
        <p data-aos="fade-up" data-aos-delay="200">أهلاً بك، أنا كريم محمد. متخصص في تحويل الهويات البصرية إلى قطع فنية رقمية فريدة.</p>
        
        <div class="showcase-container">
            <div class="neon-card" data-aos="fade-up" data-aos-delay="300">
                <img src="LAST/hoodie design.jpg" alt="Work 1">
            </div>
            <div class="neon-card" data-aos="fade-up" data-aos-delay="400">
                <img src="LAST/Green HoOdy design 2.jpg" alt="Work 2">
            </div>
        </div>

        <div class="btn-container" data-aos="fade-up" data-aos-delay="500">
            <a href="works.html" class="view-more-btn">
                <span>عرض كافة الأعمال</span>
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const cursorContainer = document.getElementById('cursor-container');
        const navMenu = document.getElementById('nav-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const isMobile = window.matchMedia("(max-width: 1024px)").matches;

        mobileMenuBtn.onclick = () => {
            navMenu.classList.toggle('active');
            mobileMenuBtn.querySelector('i').classList.toggle('fa-bars');
            mobileMenuBtn.querySelector('i').classList.toggle('fa-times');
        };

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            updateThemeUI(targetTheme);
        }

        function updateThemeUI(theme) {
            const text = document.getElementById('theme-text');
            const icon = document.getElementById('theme-icon');
            if (theme === 'light') {
                text.innerText = "الوضع الفاتح";
                icon.className = "fas fa-sun";
            } else {
                text.innerText = "الوضع الداكن";
                icon.className = "fas fa-moon";
            }
        }

        // إصلاح منطق وضع التركيز الذكي بالكامل
        let isFocusEnabled = false;
        function toggleFocusMode() {
            isFocusEnabled = !isFocusEnabled;
            document.body.classList.toggle('focus-active');
            
            const focusText = document.getElementById('focus-text');
            if (isFocusEnabled) {
                focusText.innerText = "تعطيل الوضع";
            } else {
                focusText.innerText = "تشغيل الوضع";
            }
        }

        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
        }

        let currentCursorMode = localStorage.getItem('cursorMode') || 'arrow';

        function setCursor(mode) {
            if (isMobile) return;
            currentCursorMode = mode;
            localStorage.setItem('cursorMode', mode);
            document.documentElement.classList.add('custom-cursor-active');
            cursorContainer.style.display = 'block';
            renderCursor(mode);
        }

        function renderCursor(mode) {
            if (mode === 'lens') {
                cursorContainer.innerHTML = '<div class="cursor-lens"></div>';
            } else {
                cursorContainer.innerHTML = `<svg class="cursor-arrow" viewBox="0 0 24 24"><path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" /></svg>`;
            }
        }

        // استخدام translate3d من أجل تفعيل الـ GPU لسلاسة فائقة بدون Stuttering
        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                cursorContainer.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);

            const savedColor = localStorage.getItem('userThemeColor');
            if (savedColor) {
                updateSiteColor(savedColor);
                if (document.getElementById('fullColorPicker')) {
                    document.getElementById('fullColorPicker').value = savedColor;
                }
            }
            
            setCursor(currentCursorMode);
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
    </script>
</body>
</html>
