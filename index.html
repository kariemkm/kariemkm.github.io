<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem Portfolio | Creative Designer</title>
    
    <!-- إجبار المتصفح على طلب أحجام كبيرة وعالية الدقة من الأيقونة لتبدو واضحة وبأقصى حجم متاح -->
    <link rel="icon" type="image/png" sizes="192x192" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="96x96" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="48x48" href="./LAST/logo.png?v=2.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./LAST/logo.png?v=2.0">
    <link rel="shortcut icon" type="image/x-icon" href="./LAST/logo.png?v=2.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./LAST/logo.png?v=2.0">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتغيرات الأساسية (الوضع الداكن هو الافتراضي) */
        :root {
            --bg: #030303;
            --primary: #a020f0;
            --primary-glow: rgba(160, 32, 240, 0.3);
            --text-main: #ffffff;
            --text-dim: #888;
            --nav-bg: rgba(3, 3, 3, 0.85);
            --nav-height: 90px; 
            --card-bg: #0a0a0a;
        }

        /* متغيرات الوضع الفاتح */
        [data-theme="light"] {
            --bg: #f9f9f9;
            --text-main: #111111;
            --text-dim: #666;
            --nav-bg: rgba(249, 249, 249, 0.85);
            --card-bg: #ffffff;
        }

        /* وضع التركيز (Focus Mode) بتأثير سينمائي مذهل */
        body.focus-active .showcase-container, 
        body.focus-active nav, 
        body.focus-active .btn-container,
        body.focus-active .hero p {
            opacity: 0.08;
            filter: blur(12px);
            pointer-events: none;
        }
        body.focus-active .hero h1 { 
            transform: scale(1.15); 
            text-shadow: 0 0 50px var(--primary);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s; }
        
        @media (min-width: 1025px) {
            html.custom-cursor-active, html.custom-cursor-active * { cursor: none !important; }
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- الماوس المطور بـ Magnetic Effect ناعم --- */
        #cursor-container {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100000;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
            display: none;
        }
        .cursor-lens {
            width: 45px; height: 45px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            mix-blend-mode: difference;
            box-shadow: 0 0 15px var(--primary-glow);
            animation: pulseCursor 2s infinite alternate;
        }
        @keyframes pulseCursor {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .cursor-arrow { width: 35px; height: 35px; filter: drop-shadow(0 0 8px var(--primary)); }
        #cursor-path { fill: var(--primary); stroke: #fff; stroke-width: 1.5px; }

        /* --- شريط التنقل الزجاجي المطور --- */
        nav {
            height: var(--nav-height);
            padding: 0 5%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(160, 32, 240, 0.15);
        }

        .logo-container { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
        }
        
        .logo-img {
            display: block !important;
            height: 60px; 
            width: auto;
            max-width: 260px; 
            object-fit: contain;
            transition: transform 0.4s ease;
        }
        .logo-container:hover .logo-img {
            transform: rotate(-8deg) scale(1.05);
        }

        .logo-text { 
            font-size: 1.4rem; 
            font-weight: 900; 
            color: var(--text-main); 
            letter-spacing: 0.5px;
            white-space: nowrap; 
        }

        .nav-links { display: flex; gap: 35px; list-style: none; }
        .nav-links a { 
            color: var(--text-main); 
            text-decoration: none; 
            font-size: 1rem; 
            font-weight: 600; 
            position: relative;
            padding: 5px 0;
        }
        /* أنيميشن الخط السفلي تحت أزرار القائمة */
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .menu-toggle { display: none; font-size: 1.6rem; color: var(--primary); cursor: pointer; transition: 0.3s; }

        /* --- الهيرو الفاخر مع تأثير التدرج النبضي --- */
        .hero {
            min-height: 100vh;
            padding: calc(var(--nav-height) + 60px) 5% 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at 50% 40%, var(--primary-glow) 0%, var(--bg) 70%);
            position: relative;
        }
        .hero h1 { 
            font-size: clamp(2.8rem, 8vw, 5.8rem); 
            line-height: 1.15; 
            max-width: 1000px; 
            font-weight: 900; 
            letter-spacing: -1px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .highlight { 
            color: var(--primary); 
            text-shadow: 0 0 30px var(--primary-glow);
            background: linear-gradient(45deg, var(--primary), #da70d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .hero p { color: var(--text-dim); max-width: 650px; margin: 25px auto; font-size: clamp(1rem, 2.2vw, 1.25rem); font-weight: 500; }

        /* --- حاوية معرض الأعمال المحدثة بنظام الكروت المتفاعلة ثلاثية الأبعاد --- */
        .showcase-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            margin-top: 60px;
            perspective: 2000px; /* تفعيل البُعد الثالث الحقيقي */
        }

        /* كادر النيون الدوار المتطور */
        .neon-glow-wrapper {
            position: relative;
            width: 320px;
            aspect-ratio: 3/4;
            border-radius: 24px;
            padding: 3px; /* سمك خط النيون */
            background: conic-gradient(from 0deg, transparent 40%, var(--primary) 100%);
            animation: rotateNeon 3.5s linear infinite;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        @keyframes rotateNeon {
            100% { background-image: conic-gradient(from 360deg, transparent 40%, var(--primary) 100%); }
        }

        .neon-card {
            width: 100%;
            height: 100%;
            border-radius: 21px;
            overflow: hidden;
            background: var(--card-bg);
            position: relative;
            transform: translateZ(20px); /* دفع الصورة للأمام لخلق عمق بصري رائع */
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }
        
        .neon-card img {
            width: 100%; 
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s;
            display: block;
        }
        
        /* تلميع وبث طاقة النيون عند التمرير بالماوس */
        .neon-glow-wrapper:hover {
            box-shadow: 0 0 45px var(--primary);
        }
        .neon-glow-wrapper:hover img { 
            transform: scale(1.08); 
            filter: brightness(1.15) contrast(1.05); 
        }

        /* --- الأزرار الفاخرة بأنيميشن النبض السهمي --- */
        .btn-container { margin-top: 60px; display: flex; justify-content: center; }
        .view-more-btn {
            position: relative; padding: 18px 48px;
            background: rgba(160, 32, 240, 0.04);
            border: 2px solid var(--primary);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 50px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 14px;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .view-more-btn i { transition: transform 0.3s ease; }
        
        .view-more-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 40px var(--primary);
            transform: translateY(-6px) scale(1.02);
            color: #fff;
        }
        .view-more-btn:hover i { transform: translateX(-6px); } /* حركة تفاعلية للسهم نحو اليمين واليسار */

        /* --- لوحة الإعدادات العصرية --- */
        .settings-panel {
            position: fixed; left: -280px; top: 50%; transform: translateY(-50%);
            width: 280px; background: var(--card-bg); border: 2px solid var(--primary);
            padding: 25px; z-index: 10001; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); border-radius: 0 20px 20px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .settings-panel.active { left: 0; }
        #settingsToggle {
            position: absolute; right: -45px; top: 0; width: 45px; height: 45px;
            background: var(--primary); border: none; color: white; border-radius: 0 10px 10px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 3px 0 10px var(--primary-glow);
        }
        #settingsToggle i { animation: spinCog 6s linear infinite; }
        @keyframes spinCog { 100% { transform: rotate(360deg); } }
        
        .setting-row { margin-bottom: 20px; }
        .setting-btn {
            width: 100%; padding: 10px 14px; background: rgba(160,32,240,0.08); 
            border: 1px solid rgba(160,32,240,0.4); color: var(--text-main);
            border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .setting-btn:hover { background: rgba(160,32,240,0.2); border-color: var(--primary); }

        /* الشاشات اللمسية والمحمول */
        @media (max-width: 1024px) {
            .menu-toggle { display: block; }
            .nav-links {
                position: fixed; top: var(--nav-height); right: -100%; width: 75%; height: calc(100vh - var(--nav-height));
                background: var(--nav-bg); flex-direction: column; padding: 40px 30px; transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
                border-left: 1px solid rgba(160, 32, 240, 0.2); backdrop-filter: blur(25px);
            }
            .nav-links.active { right: 0; }
            .showcase-container { flex-direction: column; align-items: center; gap: 35px; }
            .neon-glow-wrapper { width: 300px; }
        }
    </style>
</head>
<body>

    <div id="cursor-container"></div>

    <!-- لوحة التخصيص والتحكم الذكي -->
    <div id="settingsPanel" class="settings-panel">
        <button id="settingsToggle"><i class="fas fa-cog"></i></button>
        <h3 style="color: var(--primary); margin-bottom: 20px; font-weight: 800; font-size: 1.1rem;">تخصيص التجربة البصرية</h3>
        
        <div class="setting-row">
            <label style="font-size: 0.8rem; color: var(--text-dim); display:block; margin-bottom:5px;">مظهر الواجهة:</label>
            <button class="setting-btn" onclick="toggleTheme()">
                <span id="theme-text">الوضع الداكن</span>
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.8rem; color: var(--text-dim); display:block; margin-bottom:5px;">التركيز السينمائي (Esc للإلغاء):</label>
            <button class="setting-btn" onclick="toggleFocusMode()">
                <span id="focus-status">تفعيل الوضع</span>
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>

        <div class="setting-row">
            <label style="font-size: 0.8rem; color: var(--text-dim); display:block; margin-bottom:5px;">اللون السحري المحرك:</label>
            <input type="color" id="fullColorPicker" style="width:100%; height:35px; border:none; background:none; cursor:pointer;" oninput="updateSiteColor(this.value)">
        </div>

        <div id="desktop-only-settings">
            <label style="font-size: 0.8rem; color: var(--text-dim); display:block; margin-bottom:5px;">شكل المؤشر:</label>
            <div onclick="setCursor('arrow')" style="cursor:pointer; padding:10px; background:rgba(160,32,240,0.05); margin-top:5px; border-radius:8px; font-size:0.8rem; font-weight:600; border:1px solid transparent;" class="cursor-opt">✨ سهم نيون تطلّعي</div>
            <div onclick="setCursor('lens')" style="cursor:pointer; padding:10px; background:rgba(160,32,240,0.05); margin-top:5px; border-radius:8px; font-size:0.8rem; font-weight:600; border:1px solid transparent;" class="cursor-opt">🎯 عدسة التركيز المغناطيسية</div>
        </div>
    </div>

    <!-- الهيدر أو شريط التنقل المتجاوب -->
    <nav>
        <a href="index.html" class="logo-container">
            <img src="LAST/logo.png" alt="Kareem Logo" class="logo-img">
            <span class="logo-text">Kareem <span style="color: var(--primary);">Portfolio</span></span>
        </a>
        <div class="menu-toggle" id="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="nav-menu">
            <li><a href="index.html" class="active">الرئيسية</a></li>
            <li><a href="works.html">أعمالي</a></li>
            <li><a href="about.html">عني</a></li>
            <li><a href="contact.html">تواصل معي</a></li>
        </ul>
    </nav>

    <!-- قسم الهيرو الترحيبي العريض -->
    <section class="hero">
        <h1 data-aos="zoom-out" data-aos-duration="1000">Professional <br> <span class="highlight">Graphic Designer</span></h1>
        <p data-aos="fade-up" data-aos-delay="250">أهلاً بك، أنا كريم محمد. متخصص في تحويل الهويات البصرية والشعارات إلى قطع فنية رقمية فريدة تترك أثراً.</p>
        
        <div class="showcase-container">
            <!-- كارت تصميم الهودي الأول (بالمحاذاة ثلاثية الأبعاد) -->
            <div class="neon-glow-wrapper tilt-interactive-card" data-aos="fade-up" data-aos-delay="400">
                <div class="neon-card">
                    <img src="LAST/hoodie design.jpg" alt="Work 1">
                </div>
            </div>
            <!-- كارت تصميم الهودي الثاني -->
            <div class="neon-glow-wrapper tilt-interactive-card" data-aos="fade-up" data-aos-delay="550">
                <div class="neon-card">
                    <img src="LAST/Green HoOdy design 2.jpg" alt="Work 2">
                </div>
            </div>
        </div>

        <div class="btn-container" data-aos="fade-up" data-aos-delay="700">
            <a href="works.html" class="view-more-btn">
                <span>استكشف كافة الأعمال</span>
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 900, once: true, offset: 50 });

        const cursorContainer = document.getElementById('cursor-container');
        const navMenu = document.getElementById('nav-menu');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const isMobileDevice = window.matchMedia("(max-width: 1024px)").matches;

        // ميكانيكية تبديل شكل زر الهامبرغر إلى (X) في الهواتف تلقائياً وبسلاسة
        mobileMenuBtn.onclick = () => {
            navMenu.classList.toggle('active');
            const iconElement = mobileMenuBtn.querySelector('i');
            iconElement.classList.toggle('fa-bars');
            iconElement.classList.toggle('fa-times');
        };

        function toggleTheme() {
            const htmlElement = document.documentElement;
            const currentTheme = htmlElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            updateThemeUI(targetTheme);
        }

        function updateThemeUI(theme) {
            const text = document.getElementById('theme-text');
            const icon = document.getElementById('theme-icon');
            if (theme === 'light') {
                text.innerText = "الوضع الفاتح";
                icon.className = "fas fa-sun";
            } else {
                text.innerText = "الوضع الداكن";
                icon.className = "fas fa-moon";
            }
        }

        // --- ميكانيكية وضع التركيز المتكاملة المحدثة بـ Escape ---
        let isFocusActive = false;
        function toggleFocusMode() {
            isFocusActive = !isFocusActive;
            document.body.classList.toggle('focus-active');
            const statusText = document.getElementById('focus-status');
            statusText.innerText = isFocusActive ? "تعطيل وضع التركيز" : "تفعيل الوضع";
            
            if(isFocusActive) {
                const escPressHandler = (e) => {
                    if (e.key === 'Escape') {
                        toggleFocusMode();
                        document.removeEventListener('keydown', escPressHandler);
                    }
                };
                document.addEventListener('keydown', escPressHandler);
            }
        }

        // تحديث حي وفوري للألوان بما فيها التدرج المخروطي للنيون الدوار بدون ريفريش
        function updateSiteColor(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-glow', color + '4d');
            localStorage.setItem('userThemeColor', color);
            
            document.querySelectorAll('.neon-glow-wrapper').forEach(wrapper => {
                wrapper.style.backgroundImage = `conic-gradient(from 0deg, transparent 40%, ${color} 100%)`;
            });
        }

        let currentCursorMode = localStorage.getItem('cursorMode') || 'arrow';

        function setCursor(mode) {
            if (isMobileDevice) return;
            currentCursorMode = mode;
            localStorage.setItem('cursorMode', mode);
            document.documentElement.classList.add('custom-cursor-active');
            cursorContainer.style.display = 'block';
            renderCursor(mode);
        }

        function renderCursor(mode) {
            if (mode === 'lens') {
                cursorContainer.innerHTML = '<div class="cursor-lens"></div>';
            } else {
                cursorContainer.innerHTML = `<svg class="cursor-arrow" viewBox="0 0 24 24"><path id="cursor-path" d="M4.5 3V19L8.7 14.8H15.5L4.5 3Z" /></svg>`;
            }
        }

        // التحكم في حركة الماوس وتأثيرات الإمالة ثلاثية الأبعاد (3D Parallax Tilt) للكروت
        if (!isMobileDevice) {
            document.addEventListener('mousemove', (e) => {
                cursorContainer.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            });

            const interactiveCards = document.querySelectorAll('.tilt-interactive-card');
            interactiveCards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const boundingBox = card.getBoundingClientRect();
                    const currentX = e.clientX - boundingBox.left;
                    const currentY = e.clientY - boundingBox.top;
                    
                    // حساب زوايا الدوران بناء على موقع الماوس لتعطي إيحاء عمق سينمائي ثلاثي الأبعاد
                    const rotateAxisX = ((currentY / boundingBox.height) - 0.5) * -25; 
                    const rotateAxisY = ((currentX / boundingBox.width) - 0.5) * 25;   
                    
                    card.style.transform = `rotateX(${rotateAxisX}deg) rotateY(${rotateAxisY}deg) scale3d(1.06, 1.06, 1.06)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });
            });
        }

        // استعادة التفضيلات المحفوظة عند التحميل مباشرة
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);

            const savedColor = localStorage.getItem('userThemeColor') || '#a020f0';
            updateSiteColor(savedColor);
            if(document.getElementById('fullColorPicker')) document.getElementById('fullColorPicker').value = savedColor;
            
            setCursor(currentCursorMode);
        });

        document.getElementById('settingsToggle').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
    </script>
</body>
</html>
