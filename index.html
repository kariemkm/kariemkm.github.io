<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kareem | Creative Portfolio</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --card-bg: #0f0f0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* الماوس العاكس */
        #cursor {
            width: 30px; height: 30px; background-color: white;
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; mix-blend-mode: difference;
            transition: transform 0.15s ease-out, opacity 0.3s;
        }

        .container { padding: 100px 10%; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* كارت المشروع */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* حاوية الصورة وعملية الزووم */
        .image-container {
            width: 100%;
            height: 350px;
            overflow: hidden; /* عشان الصورة متطلعش بره الكارت */
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* تحافظ على أبعاد الصورة */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* لما الماوس ييجي على الكارت */
        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .card:hover img {
            transform: scale(1.15); /* تأثير الزووم اللي طلبته */
        }

        .project-info { padding: 20px; text-align: right; }
        .project-info h3 { font-size: 1.2rem; margin-bottom: 5px; color: var(--primary); }
        .project-info p { font-size: 0.9rem; color: #888; }

        h1 { text-align: center; margin-top: 100px; font-size: 3rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <h1 data-aos="fade-down">MY BEST WORKS</h1>

    <section class="container">
        <div class="grid">
            
            <div class="card" data-aos="fade-up">
                <div class="image-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQw-4-X3Z8qsSj8BQpRxPz1WGOgEDu9QrJwdQ&s" alt="Project 1">
                </div>
                <div class="project-info">
                    <h3>Strategic Branding</h3>
                    <p>تصميم هوية بصرية تعتمد على القوة والتحليل.</p>
                </div>
            </div>

            <div class="card" data-aos="fade-up" data-aos-delay="200">
                <div class="image-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSprE0Q8ueJz3OV4DiKD1vZUvz9A7hDhaACZA&s" alt="Project 2">
                </div>
                <div class="project-info">
                    <h3>Digital Art Concept</h3>
                    <p>دمج فني وتلاعب بالألوان للخروج بتصميم غير تقليدي.</p>
                </div>
            </div>

            <div class="card" data-aos="fade-up" data-aos-delay="400">
                <div class="image-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfI6-V7M9L_P9rM0m8m1rL7f-Q6P0f9qEwXw&s" alt="Project 3">
                </div>
                <div class="project-info">
                    <h3>Visual Identity</h3>
                    <p>أقوى مشاريعي في مجال الجرافيك ديزاين لعام 2026.</p>
                </div>
            </div>

        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const cursor = document.getElementById('cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 15 + 'px';
            cursor.style.top = e.clientY - 15 + 'px';
        });

        // حركة الماوس لما يقرب من الكلام (يعكسه)
        document.querySelectorAll('h1, h3, p').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(3)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
        });

        // حركة الماوس لما يقرب من الصور (يختفي والزووم يشتغل)
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                cursor.style.opacity = '0'; // الماوس يختفي عشان الزووم يبان
            });
            card.addEventListener('mouseleave', () => {
                cursor.style.opacity = '1'; // الماوس يرجع لما تخرج
            });
        });
    </script>
</body>
</html>
